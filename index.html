<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>อัปโหลดรูปลงระบบ (ส่งหลายรูป)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md p-6 mt-4">
        <h2 class="text-2xl font-bold mb-4 text-center text-blue-600">☁️ ส่งรูปลง Google Drive</h2>

        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2">เลือกรูปภาพ (เลือกได้หลายรูป)</label>
            <input type="file" id="fileInput" accept="image/*" multiple class="w-full px-3 py-2 border rounded-lg">
        </div>

        <button id="uploadBtn" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg">
            📤 ยืนยันการอัปโหลด
        </button>
        <p id="statusText" class="text-center mt-3 text-sm text-gray-500"></p>
    </div>

    <script>
        const myLiffId = "2009260001-eJBgSAYH"; 
        const n8nWebhookUrl = "https://klaadmin.tail1bd7aa.ts.net/webhook-test/line-webhook";

        async function main() {
            await liff.init({ liffId: myLiffId });
            if (!liff.isLoggedIn()) { liff.login(); }
        }
        main();

        document.getElementById("uploadBtn").addEventListener("click", async () => {
            const fileInput = document.getElementById("fileInput");
            const files = fileInput.files;
            
            if(files.length === 0) {
                alert("กรุณาเลือกรูปก่อนครับ!");
                return;
            }
            
            const btn = document.getElementById("uploadBtn");
            const status = document.getElementById("statusText");
            btn.disabled = true;
            
            let successCount = 0;

            // 🚨 จุดที่แก้ 2: วน Loop ส่งทีละรูป เพื่อให้ n8n ประมวลผลเป็นรายการๆ ไป
            for (let i = 0; i < files.length; i++) {
                btn.innerText = `กำลังส่งรูปที่ ${i + 1}/${files.length}...`;
                
                const formData = new FormData();
                formData.append("data", files[i]); // ส่งไฟล์ปัจจุบันในรอบ Loop

                try {
                    const response = await fetch(n8nWebhookUrl, {
                        method: "POST",
                        body: formData
                    });

                    if(response.ok) {
                        successCount++;
                    }
                } catch (error) {
                    console.error("Error uploading file:", files[i].name);
                }
            }

            if(successCount === files.length) {
                alert(`อัปโหลดสำเร็จครบทั้ง ${successCount} รูปแล้วครับ!`);
            } else {
                alert(`อัปโหลดสำเร็จ ${successCount} จาก ${files.length} รูป (เช็คระบบหลังบ้านอีกครั้งครับ)`);
            }

            btn.innerText = "📤 ยืนยันการอัปโหลด";
            btn.disabled = false;
            fileInput.value = ""; // ล้างคิมที่เลือกไว้หลังส่งเสร็จ
        });
    </script>
</body>
</html>
